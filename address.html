<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Cozy Kitchen - Address</title>
  <style>
    body {
      font-family: 'Century Gothic', sans-serif;
      background: #fff8f0;
      margin: 0;
    }

    /* Header / Navbar */
    header {
      background: #ff7043;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    header h2 {
      color: #fff;
      margin: 0;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    nav ul li a {
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      color: #fff;
      transition: color 0.3s;
    }
    nav ul li a:hover,
    nav ul li.active a {
      color: #333;
    }

    /* Main Section */
    main {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 70px); /* adjust for header */
      padding: 20px;
    }
    .address-container {
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 500px;
      text-align: center;
    }
    h2 {
      color: #ff7043;
      margin-bottom: 20px;
    }
    address {
      font-style: normal;
      font-size: 16px;
      color: #333;
      line-height: 1.6;
    }
    iframe {
      width: 100%;
      height: 250px;
      border: 0;
      border-radius: 15px;
      margin-top: 15px;
    }
    .back-btn {
      background: #ff7043;
      color: #fff;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.3s, transform 0.2s;
    }
    .back-btn:hover {
      background: #e64a19;
      transform: scale(1.05);
    }

    /* Responsive */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }
      nav ul {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header>
    <h2>The Cozy Kitchen</h2>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li class="active"><a href="address.html">Address</a></li>
        <li><a href="feedback.html">Feedback</a></li>
      </ul>
    </nav>
  </header>

  <!-- Address Section -->
  <main>
    <div class="address-container">
      <h2>Our Address</h2>
      <address>
        <strong>The Cozy Kitchen</strong><br />
        123 Food Street, Hassan 573201<br />
        📞 +91 98765 43257<br />
        ✉ info@thecozykitchen.com
      </address>

      <!-- Google Maps Embed -->
      <iframe
        title="The Cozy Kitchen Location"
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3907.7374018023455!2d76.1000000!3d13.0000000!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bb8cf8dd0a66837%3A0x1234567890abcdef!2s123%20Food%20Street%2C%20Hassan!5e0!3m2!1sen!2sin!4v1694707620000"
        loading="lazy"
        allowfullscreen
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>

      <!-- Back Button -->
      <button type="button" class="back-btn" onclick="goBack()">⬅ Back to Home</button>
    </div>
  </main>

  <script>
    function goBack() {
      window.location.href = "index.html"; // change if homepage file name differs
    }
  </script>

</body>
</html>
